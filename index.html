<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

<title>SQL Trainer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.js"></script>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

<div class="flex h-screen">

<div class="w-1/3 bg-white p-4 border-r overflow-auto">

<h2 class="text-xl font-bold mb-3">SQL Questions</h2>

<button onclick="loadQuestion(0)" class="block mb-2 text-blue-600">Question 1</button>
<button onclick="loadQuestion(1)" class="block mb-2 text-blue-600">Question 2</button>
<button onclick="loadQuestion(2)" class="block mb-2 text-blue-600">Question 3</button>

<hr class="my-4">

<div id="questionText"></div>

</div>

<div class="w-2/3 flex flex-col">

<div id="editor" class="h-2/3"></div>

<button onclick="runSQL()" class="bg-green-500 text-white p-3">
Run Query
</button>

<div id="output" class="bg-white p-4 h-1/3 overflow-auto"></div>

</div>

</div>

<script>

let db;

let questions = [

{
text:"Find users older than 25",
setup:`
CREATE TABLE users(id INT,name TEXT,age INT);
INSERT INTO users VALUES (1,'Alice',30);
INSERT INTO users VALUES (2,'Bob',20);
INSERT INTO users VALUES (3,'Charlie',28);
`,
solution:"SELECT * FROM users WHERE age > 25;"
},

{
text:"Show all products with price > 100",
setup:`
CREATE TABLE products(id INT,name TEXT,price INT);
INSERT INTO products VALUES (1,'Laptop',900);
INSERT INTO products VALUES (2,'Mouse',20);
INSERT INTO products VALUES (3,'Phone',500);
`,
solution:"SELECT * FROM products WHERE price > 100;"
},

{
text:"Count number of orders",
setup:`
CREATE TABLE orders(id INT,user_id INT);
INSERT INTO orders VALUES (1,1);
INSERT INTO orders VALUES (2,1);
INSERT INTO orders VALUES (3,2);
`,
solution:"SELECT COUNT(*) FROM orders;"
}

];

initSqlJs({
locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}`
}).then(SQL => {

window.SQL = SQL;

loadQuestion(0);

});

function loadQuestion(index){

db = new SQL.Database();

db.run(questions[index].setup);

document.getElementById("questionText").innerText = questions[index].text;

}

require.config({
paths:{
vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs'
}
});

require(['vs/editor/editor.main'],function(){

window.editor = monaco.editor.create(
document.getElementById('editor'),
{
value:"SELECT * FROM users;",
language:"sql",
theme:"vs-dark"
}
);

});

function runSQL(){

let query = editor.getValue();

try{

let res = db.exec(query);

let html="";

if(res.length){

let cols=res[0].columns;
let rows=res[0].values;

html+="<table border='1'>";

html+="<tr>";
cols.forEach(c=>html+="<th>"+c+"</th>");
html+="</tr>";

rows.forEach(r=>{

html+="<tr>";

r.forEach(v=>html+="<td>"+v+"</td>");

html+="</tr>";

});

html+="</table>";

}else{

html="No results";

}

document.getElementById("output").innerHTML=html;

}catch(e){

document.getElementById("output").innerHTML="Error: "+e.message;

}

}

</script>

</body>

</html>
