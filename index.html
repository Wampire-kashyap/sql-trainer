<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>SQL Cyber Trainer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.js"></script>
<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#0b0f1a;
color:#e5e7eb;
font-family:monospace;
}

.panel{
background:#141a2a;
border:1px solid #1f2a44;
padding:12px;
}

.badge{
padding:2px 8px;
border-radius:6px;
font-size:12px;
}

.easy{background:#22c55e}
.medium{background:#f59e0b}
.hard{background:#ef4444}

.btn{
background:#111827;
border:1px solid #00e5ff;
color:#00e5ff;
padding:6px 14px;
margin-right:6px;
cursor:pointer;
}

.btn:hover{
background:#00e5ff;
color:black;
}

</style>

</head>

<body>

<div class="p-4">

<div class="panel mb-2">

<h2 id="title"></h2>
<span id="difficulty"></span>

<p id="description"></p>

</div>


<div class="grid grid-cols-3 gap-2">

<div class="panel">

<h3>Schema</h3>

<pre id="schema"></pre>

<h3>Sample Data</h3>

<div id="sample"></div>

</div>


<div class="col-span-2 panel">

<div id="editor" style="height:300px"></div>

</div>

</div>


<div class="panel mt-2">

<h3>Result</h3>

<div id="output"></div>

</div>


<div class="mt-3">

<button class="btn" onclick="prev()">Previous</button>
<button class="btn" onclick="runSQL()">Run</button>
<button class="btn" onclick="submitQuery()">Submit</button>
<button class="btn" onclick="pin()">Pin</button>
<button class="btn" onclick="next()">Next</button>

</div>

</div>

<script>

let db
let index=0
let pinned=[]

let questions=[

{
title:"Users older than 25",
difficulty:"easy",
description:"Find users with age greater than 25",
schema:"users(id,name,age)",
setup:`
CREATE TABLE users(id INT,name TEXT,age INT);
INSERT INTO users VALUES (1,'Alice',30);
INSERT INTO users VALUES (2,'Bob',20);
INSERT INTO users VALUES (3,'Charlie',28);
`,
solution:"SELECT * FROM users WHERE age>25"
},

{
title:"Count Orders",
difficulty:"easy",
description:"Count total orders",
schema:"orders(id,user_id)",
setup:`
CREATE TABLE orders(id INT,user_id INT);
INSERT INTO orders VALUES (1,1);
INSERT INTO orders VALUES (2,1);
INSERT INTO orders VALUES (3,2);
`,
solution:"SELECT COUNT(*) FROM orders"
}

]


initSqlJs({
locateFile:file=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}`
}).then(SQL=>{
window.SQL=SQL
loadQuestion()
})


function loadQuestion(){

db=new SQL.Database()

let q=questions[index]

db.run(q.setup)

document.getElementById("title").innerText=q.title
document.getElementById("description").innerText=q.description
document.getElementById("schema").innerText=q.schema

let diff=document.getElementById("difficulty")
diff.className="badge "+q.difficulty
diff.innerText=q.difficulty

renderSample()

}


function renderSample(){

let table=questions[index].schema.split("(")[0]

let res=db.exec(`SELECT * FROM ${table}`)

render(res)

}


function runSQL(){

let q=editor.getValue()

try{

let res=db.exec(q)

render(res)

}catch(e){

document.getElementById("output").innerText=e.message

}

}


function render(res){

let html=""

if(res.length){

let cols=res[0].columns
let rows=res[0].values

html+="<table border='1'>"

html+="<tr>"

cols.forEach(c=>html+=`<th>${c}</th>`)

html+="</tr>"

rows.forEach(r=>{
html+="<tr>"
r.forEach(v=>html+=`<td>${v}</td>`)
html+="</tr>"
})

html+="</table>"

}

document.getElementById("output").innerHTML=html

}


function submitQuery(){

let user=editor.getValue()

let correct=questions[index].solution

try{

let r1=db.exec(user)
let r2=db.exec(correct)

if(JSON.stringify(r1)==JSON.stringify(r2))
alert("Correct 🎉")
else
alert("Wrong")

}catch{

alert("SQL Error")

}

}


function next(){

if(index<questions.length-1){

index++
loadQuestion()

}

}


function prev(){

if(index>0){

index--
loadQuestion()

}

}


function pin(){

pinned.push(index)

alert("Pinned!")

}


require.config({
paths:{vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs'}
})

require(['vs/editor/editor.main'],function(){

window.editor=monaco.editor.create(
document.getElementById('editor'),
{
value:"SELECT * FROM users;",
language:"sql",
theme:"vs-dark"
}
)

})

</script>

</body>

</html>
