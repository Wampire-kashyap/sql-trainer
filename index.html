<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>SQL Cyber Trainer</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.js"></script>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#0f0f1a;
color:#fff;
font-family:monospace;
}

.neon{
color:#00ffff;
text-shadow:0 0 8px #00ffff;
}

.cyber-btn{
background:#111;
border:1px solid #00ffff;
color:#00ffff;
padding:8px 14px;
transition:0.3s;
}

.cyber-btn:hover{
background:#00ffff;
color:black;
box-shadow:0 0 12px #00ffff;
}

.panel{
background:#161629;
border:1px solid #2a2a40;
}

</style>

</head>

<body>

<div class="flex h-screen">

<!-- LEFT PANEL -->

<div class="w-1/5 panel p-4 overflow-auto">

<h2 class="neon text-xl mb-3">PROBLEMS</h2>

<div class="space-y-2">

<div onclick="loadQuestion(0)" class="cursor-pointer">1 Users older than 25</div>
<div onclick="loadQuestion(1)" class="cursor-pointer">2 Expensive products</div>
<div onclick="loadQuestion(2)" class="cursor-pointer">3 Count orders</div>

</div>

<hr class="my-4 border-gray-700">

<h3 class="neon">DESCRIPTION</h3>

<div id="questionText" class="text-sm mt-2"></div>

</div>


<!-- DATABASE PANEL -->

<div class="w-1/5 panel p-4">

<h2 class="neon mb-3">DATABASE</h2>

<div id="dbExplorer"></div>

</div>


<!-- EDITOR PANEL -->

<div class="w-3/5 flex flex-col">

<div id="editor" class="h-2/3"></div>

<div class="flex space-x-2 p-2">

<button onclick="runSQL()" class="cyber-btn">RUN</button>

<button onclick="checkAnswer()" class="cyber-btn">SUBMIT</button>

</div>

<div id="output" class="panel h-1/3 overflow-auto p-4"></div>

</div>

</div>


<script>

let db

let questions=[

{
text:"Find users older than 25",
setup:`
CREATE TABLE users(id INT,name TEXT,age INT);
INSERT INTO users VALUES (1,'Alice',30);
INSERT INTO users VALUES (2,'Bob',20);
INSERT INTO users VALUES (3,'Charlie',28);
`,
solution:"SELECT * FROM users WHERE age > 25"
},

{
text:"Find products price > 100",
setup:`
CREATE TABLE products(id INT,name TEXT,price INT);
INSERT INTO products VALUES (1,'Laptop',900);
INSERT INTO products VALUES (2,'Mouse',20);
INSERT INTO products VALUES (3,'Phone',500);
`,
solution:"SELECT * FROM products WHERE price > 100"
},

{
text:"Count total orders",
setup:`
CREATE TABLE orders(id INT,user_id INT);
INSERT INTO orders VALUES (1,1);
INSERT INTO orders VALUES (2,1);
INSERT INTO orders VALUES (3,2);
`,
solution:"SELECT COUNT(*) FROM orders"
}

]


initSqlJs({
locateFile:file=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}`
}).then(SQL=>{

window.SQL=SQL
loadQuestion(0)

})

function loadQuestion(i){

db=new SQL.Database()

db.run(questions[i].setup)

document.getElementById("questionText").innerText=questions[i].text

renderExplorer()

}

function renderExplorer(){

let tables=db.exec("SELECT name FROM sqlite_master WHERE type='table'")

let html=""

if(tables.length){

tables[0].values.forEach(t=>{

let table=t[0]

html+=`<div class="cursor-pointer neon" onclick="preview('${table}')">${table}</div>`

})

}

document.getElementById("dbExplorer").innerHTML=html

}

function preview(table){

let res=db.exec(`SELECT * FROM ${table}`)

render(res)

}

require.config({
paths:{vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs'}
})

require(['vs/editor/editor.main'],function(){

window.editor=monaco.editor.create(
document.getElementById('editor'),
{
value:"SELECT * FROM users;",
language:"sql",
theme:"vs-dark"
}
)

})

function runSQL(){

let q=editor.getValue()

try{

let res=db.exec(q)

render(res)

}

catch(e){

document.getElementById("output").innerHTML=e.message

}

}

function render(res){

let html=""

if(res.length){

let cols=res[0].columns
let rows=res[0].values

html+="<table border='1'>"

html+="<tr>"

cols.forEach(c=>html+=`<th>${c}</th>`)

html+="</tr>"

rows.forEach(r=>{

html+="<tr>"

r.forEach(v=>html+=`<td>${v}</td>`)

html+="</tr>"

})

html+="</table>"

}

document.getElementById("output").innerHTML=html

}

function checkAnswer(){

let user=editor.getValue()

let correct=questions.find(q=>q.solution).solution

try{

let r1=db.exec(user)
let r2=db.exec(correct)

if(JSON.stringify(r1)==JSON.stringify(r2)){

alert("Correct")

}else{

alert("Wrong")

}

}

catch{

alert("SQL Error")

}

}

</script>

</body>

</html>
