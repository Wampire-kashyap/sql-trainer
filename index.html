<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>SQL Practice Platform</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f4f6;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

header{
background:white;
padding:10px 20px;
border-bottom:1px solid #e5e7eb;
display:flex;
justify-content:space-between;
align-items:center;
}

main{
flex:1;
display:grid;
grid-template-columns:380px 1fr;
overflow:hidden;
}

.left-panel{
overflow-y:auto;
padding:15px;
}

.right-panel{
padding:15px;
display:flex;
flex-direction:column;
}

.card{
background:white;
border:1px solid #e5e7eb;
border-radius:8px;
padding:12px;
margin-bottom:15px;
}

.editor{
flex:1;
border:1px solid #e5e7eb;
}

.schema-table{
border-collapse:collapse;
width:100%;
}

.schema-table th,
.schema-table td{
border:1px solid #e5e7eb;
padding:6px;
}

.buttons{
margin-top:10px;
}

button{
padding:6px 12px;
margin-right:6px;
background:#2563eb;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.badge{
background:#22c55e;
color:white;
padding:2px 6px;
border-radius:4px;
font-size:12px;
}

footer{
text-align:center;
padding:6px;
font-size:13px;
color:#6b7280;
background:white;
border-top:1px solid #e5e7eb;
}

</style>

</head>

<body>

<header>

<div>
<h3 id="title"></h3>
<span id="difficulty" class="badge"></span>
<p id="description"></p>
</div>

<div>
<label>
Autocomplete
<input type="checkbox" id="toggleAutocomplete" checked>
</label>
</div>

</header>


<main>

<div class="left-panel">

<div class="card">

<h4>Table Schema</h4>

<table class="schema-table">

<thead>
<tr>
<th>Column</th>
<th>Type</th>
</tr>
</thead>

<tbody id="schema"></tbody>

</table>

</div>


<div class="card">

<h4>Expected Output</h4>

<div id="expected"></div>

</div>


<div class="card">

<h4>Query Result</h4>

<div id="output"></div>

</div>

</div>


<div class="right-panel">

<div class="card">

<h4>Write SQL Query</h4>

<div id="editor" class="editor"></div>

</div>


<div class="buttons">

<button onclick="prev()">Prev</button>
<button onclick="runSQL()">Run</button>
<button onclick="submitQuery()">Submit</button>
<button onclick="next()">Next</button>

</div>

</div>

</main>


<footer>

Developed by <b>Kunal</b> |  
For any inquiry connect on mail:  
<b>Kunalkumarshri47@gmail.com</b>

</footer>


<script>

let db
let index=0

let questions=[

{
title:"Users older than 25",
difficulty:"Easy",
description:"Find users whose age is greater than 25.",
schema:[
["id","INT"],
["name","TEXT"],
["age","INT"]
],
setup:`
CREATE TABLE users(id INT,name TEXT,age INT);
INSERT INTO users VALUES (1,'Alice',30);
INSERT INTO users VALUES (2,'Bob',20);
INSERT INTO users VALUES (3,'Charlie',28);
`,
solution:"SELECT * FROM users WHERE age>25"
}

]


initSqlJs({
locateFile:file=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/${file}`
}).then(SQL=>{
window.SQL=SQL
loadQuestion()
})


function loadQuestion(){

db=new SQL.Database()

let q=questions[index]

db.run(q.setup)

document.getElementById("title").innerText=q.title
document.getElementById("description").innerText=q.description
document.getElementById("difficulty").innerText=q.difficulty

renderSchema()
renderExpected()

}


function renderSchema(){

let schema=questions[index].schema

let html=""

schema.forEach(c=>{
html+=`<tr><td>${c[0]}</td><td>${c[1]}</td></tr>`
})

document.getElementById("schema").innerHTML=html

}


function renderExpected(){

let res=db.exec(questions[index].solution)

renderTable(res,"expected")

}


function runSQL(){

let q=editor.getValue()

try{

let res=db.exec(q)

renderTable(res,"output")

}catch(e){

document.getElementById("output").innerText=e.message

}

}


function renderTable(res,target){

let html=""

if(res.length){

let cols=res[0].columns
let rows=res[0].values

html+="<table class='schema-table'>"

html+="<tr>"

cols.forEach(c=>html+=`<th>${c}</th>`)

html+="</tr>"

rows.forEach(r=>{

html+="<tr>"

r.forEach(v=>html+=`<td>${v}</td>`)

html+="</tr>"

})

html+="</table>"

}

document.getElementById(target).innerHTML=html

}


function submitQuery(){

let user=editor.getValue()

let correct=questions[index].solution

try{

let r1=db.exec(user)
let r2=db.exec(correct)

if(JSON.stringify(r1)==JSON.stringify(r2))
alert("Correct!")
else
alert("Try again")

}catch{

alert("SQL Error")

}

}


function next(){

if(index<questions.length-1){
index++
loadQuestion()
}

}


function prev(){

if(index>0){
index--
loadQuestion()
}

}


require.config({
paths:{vs:'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs'}
})


require(['vs/editor/editor.main'],function(){

window.editor=monaco.editor.create(
document.getElementById('editor'),
{
value:"SELECT * FROM users;",
language:"sql",
theme:"vs",
quickSuggestions:true,
suggestOnTriggerCharacters:true
}
)

editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter,function(){
runSQL()
})


monaco.languages.registerCompletionItemProvider('sql',{
provideCompletionItems:()=>{

let keywords=[
"SELECT","FROM","WHERE","GROUP BY","ORDER BY",
"INSERT","UPDATE","DELETE","JOIN","LEFT JOIN",
"RIGHT JOIN","INNER JOIN","COUNT","SUM","AVG",
"MIN","MAX","LIMIT"
]

let suggestions=keywords.map(k=>({
label:k,
kind:monaco.languages.CompletionItemKind.Keyword,
insertText:k
}))

return {suggestions}

}
})

})

</script>

</body>

</html>
