<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>SQL Practice Engine</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.6.2/sql-wasm.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.js"></script>

</head>

<body>

<header>

<div>
<h2 id="title">SQL Practice</h2>
<p id="description"></p>
</div>

<div>
<label>
Autocomplete
<input type="checkbox" id="autoToggle" checked>
</label>
</div>

</header>


<main>

<div class="left-panel">

<div class="card">

<h3>Table Schema</h3>

<table class="schema-table">

<thead>
<tr>
<th>Table</th>
<th>Columns</th>
</tr>
</thead>

<tbody id="schema"></tbody>

</table>

</div>


<div class="card">

<h3>Expected Output</h3>

<div id="expected"></div>

</div>


<div class="card">

<h3>Query Result</h3>

<div id="output"></div>

</div>

</div>


<div class="right-panel">

<div class="card">

<h3>Write SQL Query</h3>

<div id="editor"></div>

</div>


<div class="buttons">

<button onclick="prevProblem()">Prev</button>
<button onclick="runQuery()">Run</button>
<button onclick="submitQuery()">Submit</button>
<button onclick="nextProblem()">Next</button>

</div>

</div>

</main>


<footer>

Developed by <b>Kunal</b> |  
For inquiries: Kunalkumarshri47@gmail.com

</footer>

<script src="app.js"></script>

</body>

</html>
